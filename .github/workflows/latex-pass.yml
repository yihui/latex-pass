name: latex-pass

on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: macos-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-tinytex@v2

      - uses: yihui/actions/setup-r-dependencies@HEAD
        with:
          extra-packages: rmarkdown
          system-packages: pandoc

      - name: Compile and find missing packages
        run: Rscript compile.R

      - name: Generate message
        run: Rscript latex-pass.R

      - name: Post comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(cat message.txt)$(cat details.txt)"
          gh pr comment "${{ github.event.pull_request.number }}" --body "$body"
